# To deploy, simply create and push a tag: git tag x.y.z && git push origin x.y.z
name: Release and deploy Docker image

on:
  push:
    tags:
      - "*.*.*"

env:
  IMAGE_NAME: ngamesfr1/ngames-framework

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Prepare platform pair
      env:
        platform: ${{ matrix.platform }}
      run: echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

    - name: Git checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

    - name: Login to Docker registry
      run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

    - name: Build and push image by digest
      run: |
        docker buildx build . \
          --platform ${{ matrix.platform }} \
          --cache-from type=gha,scope=build-${{ env.PLATFORM_PAIR }} \
          --cache-to type=gha,mode=max,scope=build-${{ env.PLATFORM_PAIR }} \
          --output type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true \
          --metadata-file /tmp/metadata.json
        digest=$(jq -r '."containerimage.digest"' /tmp/metadata.json)
        mkdir -p /tmp/digests
        touch "/tmp/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2

    - name: Download digests
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

    - name: Login to Docker registry
      run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

    - name: Create multi-arch manifest and push
      working-directory: /tmp/digests
      run: |
        docker buildx imagetools create \
          -t ${{ env.IMAGE_NAME }}:${GITHUB_REF##*/} \
          -t ${{ env.IMAGE_NAME }}:latest \
          $(printf "${{ env.IMAGE_NAME }}@sha256:%s " *)

    - name: Inspect image
      run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${GITHUB_REF##*/}
